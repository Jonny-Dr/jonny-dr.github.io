<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='100%25' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23grad)'/%3E%3Cpath d='M12 12h8v8h-8z' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M14 14h4v4h-4z' fill='white'/%3E%3Cpath d='M16 6v3M16 23v3M6 16h3M23 16h3' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M9 9l2 2M21 21l2 2M9 23l2-2M21 9l2-2' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* 通用样式 */
    .empty-container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      padding: 4rem 1rem;
    }
    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: var(--primary);
      opacity: 0.7;
    }
    .empty-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .empty-description {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #888;
    }
    .empty-action {
      display: inline-block;
      padding: 0.8rem 1.8rem;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    .empty-action:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    
    /* 日常页面特有样式 */
    .daily-container {
      max-width: 800px;
      margin: 0 auto;
    }
    .daily-item {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: var(--transition);
      margin-bottom: 2rem;
    }
    .daily-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .daily-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--primary);
      font-weight: 700;
    }
    .daily-date {
      color: #6c757d;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .daily-content {
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .daily-read-more {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }
    .daily-read-more:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }
    @media (max-width: 768px) {
      .daily-container {
        padding: 0 1rem;
      }
      .daily-item {
        padding: 1.5rem;
      }
      .daily-title {
        font-size: 1.5rem;
      }
    }
    @media (max-width: 480px) {
      .daily-title {
        font-size: 1.3rem;
      }
      .daily-date {
        font-size: 0.85rem;
      }
    }
    
    /* 项目页面特有样式 */
    .project-container {
      max-width: 800px;
      margin: 0 auto;
    }
    .project-card {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: var(--transition);
      margin-bottom: 2rem;
    }
    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .project-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--primary);
      font-weight: 700;
    }
    .project-desc {
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .project-read-more {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }
    .project-read-more:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }
    @media (max-width: 768px) {
      .project-container {
        padding: 0 1rem;
      }
      .project-card {
        padding: 1.5rem;
      }
      .project-title {
        font-size: 1.5rem;
      }
    }
    @media (max-width: 480px) {
      .project-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <button class="music-toggle" id="musicToggle" aria-label="控制音乐">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </svg>
  </button>

  <header>
    <h1>
      <span class="header-icon">{{icon}}</span>
      <span class="header-title">{{headerTitle}}</span>
    </h1>
    <p class="subtitle">{{headerSubtitle}}</p>
    {{nav}}
  </header>

  <main class="{{contentClass}}">
    {{content}}
    {{pagination}}
    <div class="empty-container" style="display: {{content ? 'none' : 'block'}}">
      <div class="empty-icon">📭</div>
      <h2 class="empty-title">暂无内容</h2>
      <p class="empty-description">该栏目下目前还没有任何内容，敬请期待后续更新！</p>
      <a href="index.html" class="empty-action">返回首页</a>
    </div>
  </main>

  <footer>
    <p>© 2026 北辰 · 保持好奇，持续成长</p>
    <p style="margin-top: 6px; font-size: 0.9rem; color: #aaa;">
      本博客采用 <a href="https://creativecommons.org/licenses/by-nc/4.0/" style="color: var(--primary);">CC BY-NC 4.0</a> 许可 | 
      源码托管于 <a href="https://github.com/" style="color: var(--primary);">GitHub</a>
    </p>
  </footer>

  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="m18 15-6-6-6 6"/>
    </svg>
  </button>

  <script src="js/theme.js"></script>
</body>
</html>
